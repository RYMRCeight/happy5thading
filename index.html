<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;

background-image:url("back.png");
background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

height:100vh;
color:white;
overflow:hidden;
}

/* LOVE COLOR OVERLAY */

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(
rgba(255,20,147,.45),
rgba(139,0,0,.45)
);
z-index:0;
}

/* ENTER SCREEN */

#enterScreen{
z-index:1;
}

#enterBtn{

padding:24px 60px;
font-size:30px;

border:none;
border-radius:60px;

background:linear-gradient(45deg,#ff4da6,#ff0033);

color:white;

cursor:pointer;

box-shadow:
0 0 12px rgba(255,77,166,.6),
0 0 25px rgba(255,0,51,.4);

transition:.4s;

}

#enterBtn:hover{
transform:scale(1.05);
}

/* PLAYER SCREEN */

#playerScreen{

display:none;

width:95%;
max-width:520px;
height:90vh;

background:rgba(0,0,0,.55);

backdrop-filter:blur(12px);

border-radius:24px;

padding:25px;

box-shadow:
0 0 25px rgba(255,77,166,.4);

overflow:hidden;
text-align:center;

z-index:1;

}

/* COVER IMAGE */

.album{

width:220px;

border-radius:20px;

margin-bottom:15px;

box-shadow:
0 0 20px rgba(255,77,166,.5);

}

/* TEXT */

.song-title{

font-size:26px;
font-weight:bold;

color:#ffd6e8;

}

.artist{

color:#ffc0cb;
margin-bottom:15px;

}

/* LYRICS PANEL */

.lyrics{

height:300px;
overflow-y:auto;

position:relative;

padding:20px;

border-radius:18px;

line-height:1.8;

background:rgba(0,0,0,.5);

}

/* FIXED BACKGROUND */

.lyrics::before{

content:"";

position:absolute;

top:0;
left:0;
right:0;
bottom:0;

background-image:url("back.png");

background-size:cover;
background-position:center;

opacity:.35;

z-index:-1;

}

/* NORMAL LYRICS */

.lyric-line{

opacity:.35;

margin:6px 0;

transition:.4s ease;

}

/* ACTIVE LINE */

.active-line{

opacity:1;

color:#ff4da6;

font-weight:bold;

font-size:22px;

transform:scale(1.06);

text-shadow:
0 0 8px #ff4da6,
0 0 16px #ff0066,
0 0 26px rgba(255,0,102,.9);

animation:pulseGlow 1.5s infinite alternate;

}

/* GLOW ANIMATION */

@keyframes pulseGlow{

from{

text-shadow:
0 0 6px #ff4da6,
0 0 12px #ff0066;

}

to{

text-shadow:
0 0 14px #ff4da6,
0 0 30px #ff0066;

}

}

/* AUDIO PLAYER */

audio{

width:100%;

margin-top:20px;

}

/* RESTART BUTTON */

#restartBtn{

margin-top:18px;

padding:14px 36px;

font-size:16px;

border:none;

border-radius:40px;

background:linear-gradient(
45deg,
#ff4da6,
#ff0033
);

color:white;

cursor:pointer;

box-shadow:
0 0 12px rgba(255,77,166,.7);

transition:.4s;

}

#restartBtn:hover{
transform:scale(1.08);
}

</style>
</head>

<body>


<div id="enterScreen">

<button id="enterBtn">
ENTER ❤️
</button>

</div>


<div id="playerScreen">

<img class="album"
src="cover.png">

<div class="song-title">
Limang Taon Ikaw Pa Rin
</div>

<div class="artist">
by Reymarc Jason
</div>

<div class="lyrics" id="lyricsBox"></div>

<audio id="audioPlayer">
<source src="song.mp3" type="audio/mpeg">
</audio>

<button id="restartBtn">
Replay Song ❤️
</button>

</div>


<script>

const enterBtn=document.getElementById("enterBtn");
const restartBtn=document.getElementById("restartBtn");

const enterScreen=document.getElementById("enterScreen");
const playerScreen=document.getElementById("playerScreen");

const audioPlayer=document.getElementById("audioPlayer");

const lyricsBox=document.getElementById("lyricsBox");

let lyrics=[];
let currentActiveIndex=-1;


/* FULLSCREEN FUNCTION */

function openFullscreen(){

const elem=document.documentElement;

if(elem.requestFullscreen){
elem.requestFullscreen();
}
else if(elem.webkitRequestFullscreen){
elem.webkitRequestFullscreen();
}
else if(elem.msRequestFullscreen){
elem.msRequestFullscreen();
}

}


/* LOAD LRC FILE */

fetch("song.lrc")
.then(res=>res.text())
.then(text=>{

const lines=text.split("\n");

lines.forEach(line=>{

const match=line.match(/\[(\d+):(\d+\.\d+)\](.*)/);

if(match){

const min=parseInt(match[1]);
const sec=parseFloat(match[2]);

lyrics.push({
time:min*60+sec,
text:match[3]
});

}

});


lyrics.forEach((line,index)=>{

const div=document.createElement("div");

div.className="lyric-line";
div.id="line-"+index;

div.innerText=line.text;

lyricsBox.appendChild(div);

});


audioPlayer.addEventListener("timeupdate",()=>{

const currentTime=audioPlayer.currentTime;

for(let i=0;i<lyrics.length;i++){

if(currentTime>=lyrics[i].time && i!==currentActiveIndex){

currentActiveIndex=i;

document
.querySelectorAll(".lyric-line")
.forEach(el=>el.classList.remove("active-line"));

const activeLine=document.getElementById("line-"+i);

if(activeLine){

activeLine.classList.add("active-line");

lyricsBox.scrollTo({
top:activeLine.offsetTop-lyricsBox.offsetHeight/2,
behavior:"smooth"
});

}

}

}

});

});


/* ENTER BUTTON */

enterBtn.addEventListener("click",()=>{

openFullscreen();  // 👈 fullscreen trigger

enterScreen.style.display="none";
playerScreen.style.display="block";

audioPlayer.play();

});


/* RESTART BUTTON */

restartBtn.addEventListener("click",()=>{

audioPlayer.currentTime=0;
audioPlayer.play();

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You 💚</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background-image:url("back.png");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:0;
}

/* ENTER SCREEN */

#enterScreen{
z-index:1;
}

#enterBtn{
padding:22px 55px;
font-size:28px;
border:none;
background:black;
color:white;
border-radius:50px;
cursor:pointer;
}

/* PLAYER SCREEN */

#playerScreen{
display:none;
width:95%;
max-width:520px;
height:90vh;
background:rgba(0,0,0,.85);
border-radius:20px;
padding:25px;
box-shadow:0 10px 40px rgba(0,0,0,.6);
overflow:hidden;
text-align:center;
z-index:1;
}

/* COVER IMAGE */

.album{
width:220px;
border-radius:18px;
margin-bottom:15px;
}

/* TEXT */

.song-title{
font-size:26px;
font-weight:bold;
}

.artist{
color:#b3b3b3;
margin-bottom:15px;
}

/* LYRICS */

.lyrics{
height:300px;
overflow-y:auto;
position:relative;
padding:20px;
border-radius:15px;
line-height:1.7;
background:rgba(0,0,0,.6);
}

/* FIXED BACKGROUND */

.lyrics::before{
content:"";
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background-image:url("back.png");
background-size:cover;
background-position:center;
opacity:.35;
z-index:-1;
}

/* KARAOKE STYLE */

.lyric-line{
opacity:.4;
margin:6px 0;
transition:.35s ease;
}

.active-line{
opacity:1;
color:#1db954;
font-weight:bold;
font-size:19px;
text-shadow:0 0 8px rgba(29,185,84,.6);
}

/* AUDIO PLAYER */

audio{
width:100%;
margin-top:20px;
}

/* RESTART BUTTON */

#restartBtn{
margin-top:15px;
padding:12px 30px;
font-size:16px;
border:none;
border-radius:40px;
background:#1db954;
color:white;
cursor:pointer;
}

</style>
</head>

<body>


<!-- ENTER SCREEN -->

<div id="enterScreen">
<button id="enterBtn">ENTER</button>
</div>


<!-- PLAYER SCREEN -->

<div id="playerScreen">

<img class="album" src="cover.png">

<div class="song-title">
Limang Taon Ikaw Pa Rin
</div>

<div class="artist">
by Reymarc Jason
</div>

<div class="lyrics" id="lyricsBox"></div>

<audio id="audioPlayer">
<source src="song.mp3" type="audio/mpeg">
</audio>

<button id="restartBtn">
🔁 Restart Song
</button>

</div>


<script>

const enterBtn=document.getElementById("enterBtn");
const restartBtn=document.getElementById("restartBtn");

const enterScreen=document.getElementById("enterScreen");
const playerScreen=document.getElementById("playerScreen");

const audioPlayer=document.getElementById("audioPlayer");

const lyricsBox=document.getElementById("lyricsBox");

let lyrics=[];
let currentActiveIndex=-1;


/* LOAD LRC FILE */

fetch("song.lrc")
.then(res=>res.text())
.then(text=>{

const lines=text.split("\n");

lines.forEach(line=>{

const match=line.match(/\[(\d+):(\d+\.\d+)\](.*)/);

if(match){

const min=parseInt(match[1]);
const sec=parseFloat(match[2]);

lyrics.push({
time:min*60+sec,
text:match[3]
});

}

});


lyrics.forEach((line,index)=>{

const div=document.createElement("div");

div.className="lyric-line";
div.id="line-"+index;

div.innerText=line.text;

lyricsBox.appendChild(div);

});


audioPlayer.addEventListener("timeupdate",()=>{

const currentTime=audioPlayer.currentTime;

for(let i=0;i<lyrics.length;i++){

if(currentTime>=lyrics[i].time && i!==currentActiveIndex){

currentActiveIndex=i;

document
.querySelectorAll(".lyric-line")
.forEach(el=>el.classList.remove("active-line"));

const activeLine=document.getElementById("line-"+i);

if(activeLine){

activeLine.classList.add("active-line");

lyricsBox.scrollTo({
top:activeLine.offsetTop-lyricsBox.offsetHeight/2,
behavior:"smooth"
});

}

}

}

});

});


/* ENTER BUTTON */

enterBtn.addEventListener("click",()=>{

enterScreen.style.display="none";
playerScreen.style.display="block";

audioPlayer.play();

});


/* RESTART BUTTON */

restartBtn.addEventListener("click",()=>{

audioPlayer.currentTime=0;
audioPlayer.play();

});

</script>

</body>
</html>
